name: Add defects to board

# Replaces the UI-only "Auto-add to project" + "Item added -> set Status" built-in
# Projects workflows (GitHub exposes no API for those). When an issue is opened or
# labelled `defect`, add it to the board, add `status:filed`, derive area/severity
# labels from the issue form body, flag Ecosystem logs missing the dApp report
# URL, and drop it in the Triage column.
#
# Requires a repo secret `PROJECT_PAT` — a token with `project` + `repo` +
# `read:org` scope. The default GITHUB_TOKEN cannot write an org Projects v2 board.

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read

jobs:
  add-to-board:
    # Only act on the intake events: a freshly opened issue, or someone manually
    # adding the `defect` label to an existing issue. Without the second clause this
    # job re-fires on *every* later `labeled` event (area:*, sev:*, status:accepted,
    # rc:*, systemic…), each time re-stamping `status:filed` and forcing the board
    # back to Triage — clobbering the maintainer's triage progress.
    if: >-
      contains(github.event.issue.labels.*.name, 'defect') &&
      (github.event.action == 'opened' || github.event.label.name == 'defect')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_PAT }}
      OWNER: 0gfoundation
      REPO: ${{ github.repository }}
      PROJECT_NUMBER: "19"
      ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Add issue to board and set Status = Triage
        run: |
          set -euo pipefail

          # Resolve the board id, Status field id, and the "Triage" option id at
          # runtime, so this keeps working even if the board is recreated.
          read -r PROJECT_ID FIELD_ID OPTION_ID < <(
            gh api graphql -f query='
              query($l:String!,$n:Int!){
                organization(login:$l){ projectV2(number:$n){
                  id
                  field(name:"Status"){
                    ... on ProjectV2SingleSelectField { id options { id name } }
                  }
                }}
              }' -F l="$OWNER" -F n="$PROJECT_NUMBER" \
              --jq '.data.organization.projectV2 | "\(.id) \(.field.id) \(.field.options[] | select(.name=="Triage") | .id)"'
          )

          if [ -z "${OPTION_ID:-}" ]; then
            echo "Could not resolve the Triage column — is the board configured?" >&2
            exit 1
          fi

          # Keep label state in sync with the board state. This is idempotent and
          # covers issues that were manually labelled `defect` outside the form.
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "status:filed" >/dev/null

          # Parse GitHub issue-form markdown and apply the first-pass routing labels.
          # Maintainers can still correct these labels during triage.
          BODY=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json body --jq .body)
          get_field() {
            awk -v name="$1" '
              $0 == "### " name { found=1; next }
              found && /^### / { exit }
              found && NF { print; exit }
            ' <<<"$BODY"
          }

          OWNERSHIP=$(get_field "Ownership")
          SEVERITY=$(get_field "Severity")
          REPRO=$(get_field "Repro steps")
          ACTUAL=$(get_field "Actual result")
          REPORTED_TO=$(get_field "Reported to dApp URL (Ecosystem coverage logs only)")
          echo "Parsed Ownership=[$OWNERSHIP] Severity=[$SEVERITY] ReportedTo=[$REPORTED_TO]"

          # Track whether each field mapped to a known label. If the issue-form
          # wording drifts (or the body was hand-edited) the case falls through and
          # we flag the issue for a human instead of silently shipping it unlabelled.
          NEEDS_MANUAL=0
          IS_ECOSYSTEM=0

          case "$OWNERSHIP" in
            "App Suite"*) gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "area:app-suite" >/dev/null ;;
            "0G Infra"*) gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "area:0g-infra" >/dev/null ;;
            "Ecosystem dApp"*) IS_ECOSYSTEM=1; gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "area:ecosystem" --add-label "coverage-log" >/dev/null ;;
            *) echo "::warning::Ownership did not match a known area label: [$OWNERSHIP]"; NEEDS_MANUAL=1 ;;
          esac

          case "$SEVERITY" in
            "P1"*) gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "sev:P1" >/dev/null ;;
            "P2"*) gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "sev:P2" >/dev/null ;;
            "P3"*) gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "sev:P3" >/dev/null ;;
            "P4"*) gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "sev:P4" >/dev/null ;;
            *) echo "::warning::Severity did not match a known sev label: [$SEVERITY]"; NEEDS_MANUAL=1 ;;
          esac

          if [ "$NEEDS_MANUAL" -eq 1 ]; then
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "needs:manual-label" >/dev/null
          fi

          trim() {
            sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' <<<"$1"
          }

          if [ "$IS_ECOSYSTEM" -eq 1 ] && [ -n "$(trim "$REPRO")" ] && [ -n "$(trim "$ACTUAL")" ] && [ -z "$(trim "$REPORTED_TO")" ]; then
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "needs:dapp-report-url" >/dev/null
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Thanks for logging Ecosystem dApp coverage. Ecosystem bugs are record-only in this Hub: please report the actionable bug to the dApp's own channel, then edit this issue and fill **Reported to dApp URL** with that link. We added \`needs:dapp-report-url\` so triage can follow up."
          fi

          # Add the issue (no-op if already on the board) and capture the item id.
          ITEM_ID=$(gh api graphql -f query='
            mutation($p:ID!,$c:ID!){
              addProjectV2ItemById(input:{projectId:$p,contentId:$c}){ item { id } }
            }' -F p="$PROJECT_ID" -F c="$ISSUE_NODE_ID" \
            --jq '.data.addProjectV2ItemById.item.id')

          # Park it in Triage.
          gh api graphql -f query='
            mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){
              updateProjectV2ItemFieldValue(input:{
                projectId:$p, itemId:$i, fieldId:$f,
                value:{ singleSelectOptionId:$o }
              }){ projectV2Item { id } }
            }' -F p="$PROJECT_ID" -F i="$ITEM_ID" -F f="$FIELD_ID" -F o="$OPTION_ID" >/dev/null

          echo "Issue #$ISSUE_NUMBER added to the board in Triage."
