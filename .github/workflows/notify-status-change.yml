name: Notify status change

# Close the feedback loop for testers. When triage moves a defect to
# status:accepted / status:routed / status:closed, post a short comment on the
# issue explaining the outcome and what it means for their reward — so a filer
# doesn't have to read the board (or guess) to learn whether their bug counted.
#
# Uses the default GITHUB_TOKEN (issues: write) — no PAT needed, since this only
# comments on issues in this repo.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  comment:
    if: >-
      github.event.label.name == 'status:accepted' ||
      github.event.label.name == 'status:routed' ||
      github.event.label.name == 'status:closed'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      LABEL: ${{ github.event.label.name }}
    steps:
      - name: Comment on the issue
        run: |
          set -euo pipefail

          case "$LABEL" in
            "status:accepted")
              MSG="✅ **Accepted** — triage reproduced and confirmed this defect. It counts toward your reward tier (rewards are on **accepted, deduped** core findings). See [LEVELS.md](../../blob/main/LEVELS.md)." ;;
            "status:routed")
              MSG="📤 **Routed upstream** to the owning team. It still counts toward your reward — routed and accepted are both rewardable states." ;;
            "status:closed")
              MSG="🔒 **Closed.** If this was a duplicate, the shared root cause is credited to the first filer. If it was not reproducible or out of bounds, it does not count toward a tier — see [TRIAGE.md](../../blob/main/.github/TRIAGE.md) for the rules." ;;
            *)
              echo "Unhandled label: $LABEL"; exit 0 ;;
          esac

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$MSG"
          echo "Commented on #$ISSUE_NUMBER for $LABEL."
