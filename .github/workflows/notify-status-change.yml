name: Notify status change

# Close the feedback loop for testers. When triage moves a defect to
# status:accepted / status:routed / status:closed, post a short comment on the
# issue explaining the outcome and what it means for their reward — so a filer
# doesn't have to read the board (or guess) to learn whether their bug counted.
#
# Uses the default GITHUB_TOKEN (issues: write) — no PAT needed, since this only
# comments on issues in this repo.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  comment:
    if: >-
      github.event.label.name == 'status:accepted' ||
      github.event.label.name == 'status:routed' ||
      github.event.label.name == 'status:closed'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      LABEL: ${{ github.event.label.name }}
      AUTHOR: ${{ github.event.issue.user.login }}
    steps:
      - uses: actions/checkout@v4

      - name: Comment on the issue
        run: |
          set -euo pipefail

          # The reward consequence of "accepted" depends on the issue's area, so a
          # blanket "counts toward your reward tier" would lie to two groups:
          #   - Ecosystem coverage logs are record-only — never rewardable.
          #   - An accepted 0G Infra bug does NOT clear L1 on its own (L1 needs App
          #     Suite); it only counts once paired with an accepted App Suite bug.
          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name' | tr '\n' ' ')
          has() { case " $LABELS " in *" $1 "*) return 0 ;; *) return 1 ;; esac }

          ACCEPTED_MSG="✅ **Accepted** — triage reproduced and confirmed this defect. It counts toward your reward tier (rewards are on **accepted, deduped** core findings). See [LEVELS.md](../../blob/main/LEVELS.md)."
          if has "area:ecosystem" || has "coverage-log"; then
            ACCEPTED_MSG="✅ **Coverage logged** — thanks for confirming this. Ecosystem dApps are **record-only**, so this does **not** count toward a reward tier; route the actionable bug to the dApp's own channel. See [LEVELS.md](../../blob/main/LEVELS.md)."
          elif has "area:0g-infra"; then
            ACCEPTED_MSG="✅ **Accepted** — triage reproduced and confirmed this **0G Infra** defect. Note: an Infra bug alone does **not** clear L1 (that needs an accepted **App Suite** bug); paired with one it gets you to L2. See [LEVELS.md](../../blob/main/LEVELS.md)."
          elif has "area:app-suite"; then
            ACCEPTED_MSG="✅ **Accepted** — triage reproduced and confirmed this **App Suite** defect; that clears **L1**. Add an accepted **0G Infra** bug to reach **L2**. Rewards are on **accepted, deduped** core findings. See [LEVELS.md](../../blob/main/LEVELS.md)."
          fi

          case "$LABEL" in
            "status:accepted")
              MSG="$ACCEPTED_MSG" ;;
            "status:routed")
              MSG="📤 **Routed upstream** to the owning team. If it was a rewardable core defect it still counts — routed and accepted are both rewardable states." ;;
            "status:closed")
              MSG="🔒 **Closed.** If this was a duplicate, the shared root cause is credited to the first filer. If it was not reproducible or out of bounds, it does not count toward a tier — see [TRIAGE.md](../../blob/main/.github/TRIAGE.md) for the rules." ;;
            *)
              echo "Unhandled label: $LABEL"; exit 0 ;;
          esac

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$MSG"
          echo "Commented on #$ISSUE_NUMBER for $LABEL."

      - name: Update signup progress preview
        if: >-
          github.event.label.name == 'status:accepted' ||
          github.event.label.name == 'status:routed'
        run: |
          set -euo pipefail

          LABELS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name' | tr '\n' ' ')
          has() { case " $LABELS " in *" $1 "*) return 0 ;; *) return 1 ;; esac }

          if has "area:ecosystem" || has "coverage-log"; then
            echo "Ecosystem coverage is record-only; skipping reward progress preview."
            exit 0
          fi

          if ! { has "area:app-suite" || has "area:0g-infra"; }; then
            echo "No rewardable core area label; skipping reward progress preview."
            exit 0
          fi

          SIGNUP_NUMBER=$(gh issue list \
            --repo "$REPO" \
            --state all \
            --label signup \
            --author "$AUTHOR" \
            --limit 100 \
            --json number,createdAt \
            --jq 'sort_by(.createdAt)[0].number // ""')

          if [ -z "$SIGNUP_NUMBER" ]; then
            echo "No signup issue found for @$AUTHOR; skipping reward progress preview."
            exit 0
          fi

          REPORT=$(node scripts/export-reward-report.mjs --repo "$REPO" --signups-from-issues --format json)
          USER=$(printf '%s' "$AUTHOR" | tr '[:upper:]' '[:lower:]')
          ROW=$(jq -c --arg user "$USER" '.rows[] | select(.githubUsername == $user)' <<<"$REPORT" | head -n 1)

          if [ -z "$ROW" ]; then
            echo "No reward row found for @$AUTHOR; skipping reward progress preview."
            exit 0
          fi

          LEVEL=$(jq -r '.issueLevel // ""' <<<"$ROW")
          CREDIT=$(jq -r '.issueCredit // 0' <<<"$ROW")
          TOTAL=$(jq -r '.acceptedDeduped // 0' <<<"$ROW")
          APP_SUITE=$(jq -r '.appSuite // 0' <<<"$ROW")
          INFRA=$(jq -r '.infra // 0' <<<"$ROW")
          SYSTEMIC=$(jq -r '.systemic // 0' <<<"$ROW")
          CANONICAL=$(jq -r '.canonicalIssues // ""' <<<"$ROW")

          if [ -z "$LEVEL" ]; then
            LEVEL="not yet"
          fi

          if [ "$LEVEL" = "L3" ]; then
            NEXT="L3 is the current cap. Keep reports high-signal; final payout still follows export."
          elif [ "$APP_SUITE" -lt 1 ]; then
            NEXT="Need 1 accepted App Suite defect for L1."
          elif [ "$INFRA" -lt 1 ]; then
            NEXT="Need 1 accepted 0G Infra defect, paired with your App Suite accept, for L2."
          else
            NEED_CORE=$((5 - TOTAL))
            if [ "$NEED_CORE" -lt 0 ]; then
              NEED_CORE=0
            fi

            if [ "$NEED_CORE" -gt 0 ]; then
              NEXT="Need ${NEED_CORE} more accepted, deduped core defect(s) for L3."
            else
              NEXT="L3 criteria appear met; final payout still follows export."
            fi
          fi

          gh issue comment "$SIGNUP_NUMBER" --repo "$REPO" --body-file - <<EOF
          📊 **Reward progress preview** (advisory)

          Current level: **$LEVEL** ($CREDIT 0G Compute Credit)

          Accepted, deduped core findings: **$TOTAL**
          - App Suite: **$APP_SUITE**
          - 0G Infra: **$INFRA**
          - Systemic: **$SYSTEMIC**

          Canonical issues: ${CANONICAL:-none yet}

          Next gate: $NEXT

          Final payout still comes from the reward export after triage and de-duplication.
          EOF

          echo "Updated signup #$SIGNUP_NUMBER with reward progress preview for @$AUTHOR."
